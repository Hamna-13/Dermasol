name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  web:
    if: ${{ hashFiles('package.json') != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 18, 20 ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint || echo "no lint script"

      - name: Type check
        if: ${{ hashFiles('tsconfig.json') != '' }}
        run: npm run typecheck || echo "no typecheck script"

      - name: Test
        run: npm test || echo "no tests"

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: |
            .next
            build
            dist
            out

  python:
    if: ${{ hashFiles('**/*.py') != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12" ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint
        run: |
          if command -v ruff >/dev/null 2>&1; then ruff check .; else echo "ruff not installed"; fi
          if command -v flake8 >/dev/null 2>&1; then flake8 .; else echo "flake8 not installed"; fi

      - name: Test
        run: |
          if command -v pytest >/dev/null 2>&1; then pytest -q; else python -m unittest -q; fi
